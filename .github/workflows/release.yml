name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Tag the commit ──────────────────────────────────────────────────────
  tag:
    name: Create git tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: ver
        run: echo "version=$(cat .app-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

  # ── 2a. Linux binary + packages ───────────────────────────────────────────
  build-linux:
    name: Build Linux packages
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            rpm \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libxcb-shape0 \
            libxcb-keysyms1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-xkb1 \
            libxcb-render-util0 \
            libxcb-cursor0 \
            libtiff5

      - name: Install Task
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Build Linux packages
        env:
          QT_QPA_PLATFORM: offscreen
        run: task build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.tar.gz
            dist/*.rpm

  # ── 2b. Windows .exe ──────────────────────────────────────────────────────
  build-windows:
    name: Build Windows binary
    needs: tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows binary
        run: task build:windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/windows/inventory.exe

  # ── 3. Publish GitHub release ─────────────────────────────────────────────
  publish:
    name: Publish GitHub release
    needs: [tag, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist/windows

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          mv dist/windows/inventory.exe "dist/windows/inventory-${VERSION}-windows-x86_64.exe"
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --notes "Release v${VERSION}" \
            dist/linux/*.deb \
            dist/linux/*.tar.gz \
            dist/linux/*.rpm \
            "dist/windows/inventory-${VERSION}-windows-x86_64.exe"
